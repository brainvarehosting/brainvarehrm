[build]
  base = "apps/web"
  command = "cd ../.. && npx pnpm@9 install --frozen-lockfile && npx pnpm@9 --filter @brainvare/web build"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--no-optional"

# Next.js plugin handles SSR + API routes automatically
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirect all API calls to Next.js serverless functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/___netlify-handler/api/:splat"
  status = 200

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
